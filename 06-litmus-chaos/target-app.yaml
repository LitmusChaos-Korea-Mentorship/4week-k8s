apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-web
  labels:
    app: chaos-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chaos-web
  template:
    metadata:
      labels:
        app: chaos-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-web
  labels:
    app: chaos-web
spec:
  type: ClusterIP
  selector:
    app: chaos-web
  ports:
    - name: http
      port: 80
      targetPort: 80

